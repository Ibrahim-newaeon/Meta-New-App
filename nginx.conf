# nginx/nginx.conf
# Production reverse proxy for al-ai.ai Meta Ads Platform
# SSL terminated at nginx, proxied to Next.js on :3000

user nginx;
worker_processes auto;
pid /var/run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
  worker_connections 1024;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Logging
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" rt=$request_time';
  access_log /var/log/nginx/access.log main;

  # Performance
  sendfile           on;
  tcp_nopush         on;
  tcp_nodelay        on;
  keepalive_timeout  65;
  gzip               on;
  gzip_types         text/plain application/json application/javascript text/css;
  gzip_min_length    1000;

  # Rate limiting zones
  limit_req_zone  $binary_remote_addr zone=api:10m      rate=30r/m;
  limit_req_zone  $binary_remote_addr zone=auth:10m     rate=5r/m;
  limit_req_zone  $binary_remote_addr zone=general:10m  rate=60r/m;
  limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

  # Hide nginx version
  server_tokens off;

  # Upstream
  upstream dashboard {
    server dashboard:3000;
    keepalive 32;
  }

  upstream n8n {
    server n8n:5678;
    keepalive 8;
  }

  # HTTP → HTTPS redirect
  server {
    listen 80;
    server_name app.al-ai.ai;
    return 301 https://$host$request_uri;
  }

  # Main HTTPS server — dashboard
  server {
    listen 443 ssl http2;
    server_name app.al-ai.ai;

    # SSL — managed by Certbot / Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/app.al-ai.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.al-ai.ai/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # Security headers (supplement Next.js headers)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Connection limits
    limit_conn conn_limit 20;

    # Auth routes — strict rate limit
    location /api/auth {
      limit_req zone=auth burst=3 nodelay;
      proxy_pass         http://dashboard;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header   Connection        "";
    }

    # API routes
    location /api {
      limit_req zone=api burst=10 nodelay;
      proxy_pass         http://dashboard;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header   Connection        "";
      proxy_read_timeout 120s;  # Claude API calls can be slow
    }

    # Next.js static files — aggressive caching
    location /_next/static {
      proxy_pass        http://dashboard;
      proxy_cache_valid 200 365d;
      add_header        Cache-Control "public, max-age=31536000, immutable";
    }

    # Everything else
    location / {
      limit_req zone=general burst=20 nodelay;
      proxy_pass         http://dashboard;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header   Connection        "";
    }
  }

  # n8n — internal only (restrict to VPN/office IPs in prod)
  server {
    listen 443 ssl http2;
    server_name n8n.al-ai.ai;

    ssl_certificate     /etc/letsencrypt/live/n8n.al-ai.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/n8n.al-ai.ai/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Restrict n8n to specific IPs — replace with your office/VPN range
    # allow 10.0.0.0/8;
    # deny all;

    location / {
      proxy_pass         http://n8n;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        "upgrade";  # WebSocket for n8n UI
      proxy_read_timeout 3600s;
    }
  }
}
